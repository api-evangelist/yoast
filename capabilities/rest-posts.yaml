naftiko: 1.0.0-alpha2
info:
  label: Yoast REST API — Posts
  description: 'Yoast REST API — Posts. 2 operations. Lead operation: List Posts With SEO Data. Self-contained Naftiko capability
    covering one Yoast business surface.'
  tags:
  - Yoast
  - Posts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    YOAST_API_KEY: YOAST_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-posts
    baseUri: https://{site}/wp-json
    description: Yoast REST API — Posts business capability. Self-contained, no shared references.
    resources:
    - name: wp-v2-posts
      path: /wp/v2/posts
      operations:
      - name: listpostswithseo
        method: GET
        description: List Posts With SEO Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: query
          type: string
          description: Filter by post slug
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: per_page
          in: query
          type: integer
          description: Number of posts per page (max 100)
    - name: wp-v2-posts-id
      path: /wp/v2/posts/{id}
      operations:
      - name: getpostwithseo
        method: GET
        description: Get Post With SEO Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: WordPress post ID
          required: true
  exposes:
  - type: rest
    namespace: rest-posts-rest
    port: 8080
    description: REST adapter for Yoast REST API — Posts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/wp/v2/posts
      name: wp-v2-posts
      description: REST surface for wp-v2-posts.
      operations:
      - method: GET
        name: listpostswithseo
        description: List Posts With SEO Data
        call: rest-posts.listpostswithseo
        with:
          slug: rest.slug
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/wp/v2/posts/{id}
      name: wp-v2-posts-id
      description: REST surface for wp-v2-posts-id.
      operations:
      - method: GET
        name: getpostwithseo
        description: Get Post With SEO Data
        call: rest-posts.getpostwithseo
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-posts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Yoast REST API — Posts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-posts-seo-data
      description: List Posts With SEO Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-posts.listpostswithseo
      with:
        slug: tools.slug
        page: tools.page
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: get-post-seo-data
      description: Get Post With SEO Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-posts.getpostwithseo
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
