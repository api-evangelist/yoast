naftiko: "1.0.0-alpha1"

info:
  label: "Yoast REST API"
  description: >-
    The Yoast REST API returns all SEO metadata including meta tags, Schema.org JSON-LD,
    canonical URLs, Open Graph, Twitter Card data, and robots directives for any URL or post
    on a WordPress site. Designed for headless WordPress implementations.
  tags:
    - Yoast
    - SEO
    - WordPress
    - Metadata
    - Headless
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      YOAST_SITE_URL: YOAST_SITE_URL

capability:
  consumes:
    - type: http
      namespace: yoast-rest
      baseUri: "{{YOAST_SITE_URL}}/wp-json"
      description: "Yoast REST API for SEO metadata retrieval from WordPress sites"
      resources:
        - name: seo-head
          path: /yoast/v1/get_head
          description: "Retrieve all SEO metadata for a given URL"
          operations:
            - name: get-seo-head
              method: GET
              description: "Returns all SEO metadata for a URL including meta tags, Schema.org, OG, and Twitter Card data"
              inputParameters:
                - name: url
                  in: query
                  type: string
                  required: true
                  description: "Full URL of the page to retrieve SEO metadata for"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: posts
          path: /wp/v2/posts
          description: "WordPress posts with Yoast SEO metadata"
          operations:
            - name: list-posts-with-seo
              method: GET
              description: "Returns posts with Yoast SEO metadata (yoast_head and yoast_head_json)"
              inputParameters:
                - name: slug
                  in: query
                  type: string
                  required: false
                  description: "Filter by post slug"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number for pagination"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Number of posts per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-post-with-seo
              method: GET
              description: "Returns a single post with Yoast SEO metadata"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "WordPress post ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pages
          path: /wp/v2/pages
          description: "WordPress pages with Yoast SEO metadata"
          operations:
            - name: list-pages-with-seo
              method: GET
              description: "Returns pages with Yoast SEO metadata"
              inputParameters:
                - name: slug
                  in: query
                  type: string
                  required: false
                  description: "Filter by page slug"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number for pagination"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Number of pages per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-page-with-seo
              method: GET
              description: "Returns a single page with Yoast SEO metadata"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "WordPress page ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: yoast-rest-api
      resources:
        - path: /v1/seo-head
          name: seo-head
          description: "Retrieve SEO metadata for any URL"
          operations:
            - method: GET
              name: get-seo-head
              description: "Get all SEO metadata for a URL"
              call: "yoast-rest.get-seo-head"
              with:
                url: "rest.url"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/posts
          name: posts
          description: "WordPress posts with SEO metadata"
          operations:
            - method: GET
              name: list-posts-with-seo
              description: "List posts with SEO metadata"
              call: "yoast-rest.list-posts-with-seo"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/posts/{id}
          name: post
          description: "Single WordPress post with SEO metadata"
          operations:
            - method: GET
              name: get-post-with-seo
              description: "Get post with SEO metadata"
              call: "yoast-rest.get-post-with-seo"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/pages
          name: pages
          description: "WordPress pages with SEO metadata"
          operations:
            - method: GET
              name: list-pages-with-seo
              description: "List pages with SEO metadata"
              call: "yoast-rest.list-pages-with-seo"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/pages/{id}
          name: page
          description: "Single WordPress page with SEO metadata"
          operations:
            - method: GET
              name: get-page-with-seo
              description: "Get page with SEO metadata"
              call: "yoast-rest.get-page-with-seo"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: yoast-rest-mcp
      transport: http
      tools:
        - name: get-seo-head
          description: "Get all SEO metadata for a URL"
          hints:
            readOnly: true
            openWorld: true
          call: "yoast-rest.get-seo-head"
          with:
            url: "tools.url"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-posts-with-seo
          description: "List WordPress posts with SEO metadata"
          hints:
            readOnly: true
            openWorld: true
          call: "yoast-rest.list-posts-with-seo"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-post-with-seo
          description: "Get a single post with SEO metadata"
          hints:
            readOnly: true
            openWorld: false
          call: "yoast-rest.get-post-with-seo"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-pages-with-seo
          description: "List WordPress pages with SEO metadata"
          hints:
            readOnly: true
            openWorld: true
          call: "yoast-rest.list-pages-with-seo"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-page-with-seo
          description: "Get a single page with SEO metadata"
          hints:
            readOnly: true
            openWorld: false
          call: "yoast-rest.get-page-with-seo"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
