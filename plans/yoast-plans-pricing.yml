specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Yoast
providerId: yoast
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - SEO
  - WordPress
  - Plugin
  - Content
description: |
  Yoast is sold as a WordPress / Shopify plugin licence rather than a metered API. The
  Yoast SEO plugin exposes its functionality via internal WordPress REST routes (under
  /wp-json/yoast/v1/...) which inherit the WordPress site's own auth and throttling
  rather than a Yoast-hosted gateway. Pricing below reflects the published Yoast Premium
  plugin licence; there is no separate Yoast API price card to reconcile.
sources:
  - https://yoast.com/wordpress/plugins/seo/pricing/
notes: |
  Reconciled the Premium licence tier from yoast.com (USD 118.80/year ex-VAT). Free and
  add-on bundles are listed but only Premium has a confirmed headline price; everything
  else is held as "see vendor pricing" rather than fabricated.
plans:
  - id: yoast-seo-free
    name: Yoast SEO (Free)
    type: freemium
    description: Free WordPress plugin available via wordpress.org. No paid entitlement;
      the plugin operates entirely inside the user's WordPress install.
    entries:
      - label: Plugin Licence
        name: free_licence
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
    elements:
      - name: Core SEO checks
      - name: Readability analysis
      - name: WordPress REST integration on the host site
  - id: yoast-seo-premium
    name: Yoast SEO Premium
    type: subscription
    description: Annual licence for the Yoast SEO Premium plugin on a single WordPress site.
    entries:
      - label: Premium Licence (1 site)
        name: premium_licence
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '$118.80 / year (ex VAT)'
        userMultiplied: false
    elements:
      - name: Up to 5 keyphrases per page
      - name: Redirect manager
      - name: Internal linking suggestions
      - name: AI title and description suggestions
      - name: Social previews (Facebook, X)
      - name: 24/7 support
      - name: Bundled Local SEO, Video SEO, News SEO plugins
      - name: One Google Docs add-on seat
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
