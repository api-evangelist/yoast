specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Yoast
providerId: yoast
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - SEO
  - WordPress
  - Plugin
  - Rate Limiting
description: |
  Yoast does not run a hosted developer API gateway. The plugin exposes functionality via
  WordPress REST endpoints on the host site, so request throttling is governed by the
  customer's own WordPress / hosting stack (e.g. Apache / nginx / WP Engine) rather than
  by Yoast. There is therefore no Yoast-published per-second or per-minute number to
  reconcile.
sources:
  - https://yoast.com/wordpress/plugins/seo/pricing/
responseCodes:
  throttled: 429
limits:
  - name: Host-WordPress throttling (varies)
    scope: account
    metric: varies
    limit: governed by the host WordPress / hosting provider
    notes: Yoast does not publish a Yoast-specific rate-limit policy; calls to
      /wp-json/yoast/v1/* hit the customer's own WordPress install.
policies:
  - name: No Yoast gateway
    description: Yoast is delivered as plugin code, not as a managed API; rate limits are
      whatever the host WordPress / hosting platform enforces.
  - name: Backoff
    description: When Yoast call-outs to external services (e.g. yoast.com licence
      activation) return 429 / 5xx, clients should back off and retry with jitter.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
