specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Yoast
providerId: yoast
publisherName: Yoast B.V.
serviceCategory: SEO / Content
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - SEO
  - WordPress
  - Plugin
  - FinOps
  - FOCUS
description: |
  FOCUS-aligned FinOps view for Yoast: a flat annual plugin licence (per WordPress site /
  Shopify store) rather than a metered API. Cost surface is dominated by Premium licence
  renewals plus optional add-on plugins.
sources:
  - https://yoast.com/wordpress/plugins/seo/pricing/
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
focusColumns:
  ServiceName: Yoast SEO
  ServiceCategory: SEO / Content
  ProviderName: Yoast
  PublisherName: Yoast B.V.
  InvoiceIssuerName: Yoast B.V.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: premium_site_licences
    description: Count of active Yoast SEO Premium site licences renewed annually.
    unit: licence-year
    aggregation: count
    dimensions:
      - product
      - site
  - name: addon_licences
    description: Add-on plugin licences (Local SEO, Video SEO, News SEO, WooCommerce SEO,
      Yoast SEO for Shopify) purchased separately or as part of bundles.
    unit: licence-year
    aggregation: count
    dimensions:
      - product
      - site
principles:
  - name: Visibility
    description: Visibility is invoice-driven via the my.yoast.com account; there is no
      usage telemetry for the plugin itself.
  - name: Allocation
    description: Allocate Yoast spend per WordPress site / brand by tagging each licence
      to the owning site URL within my.yoast.com.
  - name: Optimization
    description: Cost levers are bundle selection (Premium vs Premium + add-ons), multi-site
      packs, and choosing the free Yoast SEO where Premium features are not needed.
  - name: Accountability
    description: Marketing / web ops typically owns Yoast renewal; finance reconciles the
      annual purchase line on the my.yoast.com invoice.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
